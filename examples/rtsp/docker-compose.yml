services:
  go2rtc:
    image: alexxit/go2rtc:latest
    network_mode: host
    volumes:
      - ./go2rtc.yaml:/config/go2rtc.yaml
    restart: unless-stopped
    depends_on:
      - rtsp-pusher
    devices:
      - /dev/dri:/dev/dri  # 挂载核显，如不需要转码H.254可以不用

  rtsp-pusher:
    build:
      context: ../..
      dockerfile: examples/rtsp/Dockerfile
    network_mode: host
    environment:
      - DEVICE_INDEX=${DEVICE_INDEX:-}
    volumes:
      - ../../data:/app/examples/rtsp/data

    stdin_open: true
    tty: true
    restart: unless-stopped
